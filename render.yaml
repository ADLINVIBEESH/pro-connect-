
services:
  # ── Backend (Web Service) ──────────────────────────────────────
  - type: web
    name: proconnect-backend
    runtime: node     
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false            # you'll set this manually in the dashboard
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a random secret
      - key: FRONTEND_URL
        sync: false            # set to your frontend's Render URL after deploying
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────
  - type: web
    name: proconnect-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false            # set to your backend's Render URL (e.g. https://proconnect-backend.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
